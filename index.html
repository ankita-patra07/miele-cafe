<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
    <title>Miele Cafe</title>
</head>
<body>
    <header>
        <div class="offer">
            Fresh roasts every morning | Signature desserts after 6 PM
        </div>
        <nav id="navbar" aria-label="Main navigation">
            <div id="logo">
                <img src="miele-logo.png" alt="Miele Cafe logo">
            </div>
            <ul class="nav-links">
                <li><a href="#menu">Menu</a></li>
                <li><a href="#stories">Stories</a></li>
                <li><a href="#visit">Visit</a></li>
                <li><a href="#visit">Cart</a></li>
                <li><a href="#visit">Contact Us</a></li>

            </ul>
            <div class="social-links" aria-label="Social media links">
                <a href="#" aria-label="X"><i class="fa-brands fa-x-twitter"></i></a>
                <a href="#" aria-label="Instagram"><i class="fa-brands fa-instagram"></i></a>
                <a href="#" aria-label="Facebook"><i class="fa-brands fa-facebook"></i></a>
            </div>
        </nav>
    </header>
    <main id="hero-content">
        <section id="intro">
            <div id="intro-info">
                <h4>Your Neighbourhood Cafe</h4>
            </div>
        </section>
    </main>
</body>
</html>
